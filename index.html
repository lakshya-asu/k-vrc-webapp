    <div id="hero-3d">
      <canvas id="three-canvas"></canvas>

      <div id="emotion-indicator">
        <span id="emotion-dot"></span>
        <span id="emotion-label">neutral</span>
      </div>

      <div id="chat-overlay">
        <div id="chat-header">
          <span id="chat-title">K-VRC</span>
          <button id="chat-toggle" aria-label="Toggle chat">▾</button>
        </div>
        <div id="chat-body">
          <div id="chat-log" role="log" aria-live="polite" aria-label="Conversation with K-VRC"></div>
          <div id="chat-input-row">
            <button id="mic-btn" aria-label="Start voice input" title="Voice input">🎤</button>
            <input
              id="chat-input"
              type="text"
              placeholder="Ask K-VRC anything..."
              aria-label="Message K-VRC"
              maxlength="1000"
              autocomplete="off"
            />
            <button id="send-btn">Send</button>
          </div>
        </div>
      </div>
    </div>

    <div id="sidenote-panel" aria-live="polite">
      <div id="sidenote-label">Lakshya's Take</div>
      <p id="sidenote-text"></p>
      <div id="sidenote-links"></div>
    </div>
