const MOOD_COLORS = {
  cold:   { primary: '#00cfff', secondary: '#0066aa', bg: '#010810' },
  warm:   { primary: '#ffaa22', secondary: '#ff6600', bg: '#0f0500' },
  glitch: { primary: '#ff00ee', secondary: '#880077', bg: '#080005' },
  static: { primary: '#aaaaaa', secondary: '#555555', bg: '#060606' },
  data:   { primary: '#00ff88', secondary: '#00aa55', bg: '#010a04' },
  boot:   { primary: '#00e5ff', secondary: '#0088aa', bg: '#040c10' },
  angry:  { primary: '#ff2200', secondary: '#881100', bg: '#0f0000' },
  dream:  { primary: '#cc88ff', secondary: '#7744bb', bg: '#070010' },
};

// ── Canvas drawing ────────────────────────────────────────────
const CW = 140, CH = 140;

function drawFace(canvas, entry, t) {
  const ctx = canvas.getContext('2d');
  const c = MOOD_COLORS[entry.mood] ?? MOOD_COLORS.cold;
  const w = entry.w;

  // Background
  ctx.fillStyle = c.bg;
  ctx.fillRect(0, 0, CW, CH);

  ctx.fillStyle = c.primary;
  ctx.strokeStyle = c.primary;
  ctx.shadowColor = c.primary;
  ctx.shadowBlur = 18;

  const EY = CH * 0.42, EX_OFF = CW * 0.175, ES = CW * 0.12;

  // Eyes
  const eyeH = ES * 1.6 * (1 - w.es * 0.75);
  [CW/2 - EX_OFF, CW/2 + EX_OFF].forEach(ex => {
    ctx.beginPath();
    ctx.ellipse(ex, EY, ES * 0.5, Math.max(eyeH * 0.5, 1.5), 0, 0, Math.PI * 2);
    ctx.fill();
  });

  // Brows
  const browY = EY - ES * 0.9 - w.br * ES * 0.6;
  ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.shadowBlur = 8;
  if (w.bf > 0.15) {
    const furrX = w.bf * ES * 0.5;
    ctx.beginPath();
    ctx.moveTo(CW/2 - EX_OFF - ES * 0.5, browY - furrX * 0.5);
    ctx.lineTo(CW/2 - EX_OFF + ES * 0.4, browY + furrX * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(CW/2 + EX_OFF + ES * 0.5, browY - furrX * 0.5);
    ctx.lineTo(CW/2 + EX_OFF - ES * 0.4, browY + furrX * 0.5);
    ctx.stroke();
  } else {
    [CW/2 - EX_OFF, CW/2 + EX_OFF].forEach(ex => {
      ctx.beginPath();
      ctx.moveTo(ex - ES * 0.5, browY);
      ctx.lineTo(ex + ES * 0.5, browY);
      ctx.stroke();
    });
  }

  // Mouth
  const MY = CH * 0.65;
  ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.shadowBlur = 10;
  if (w.mo > 0.1) {
    ctx.beginPath();
    ctx.ellipse(CW/2, MY, 22 + w.sw * 14, 8 + w.mo * 14, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (w.sw > 0.05) {
    ctx.beginPath();
    ctx.arc(CW/2, MY - 6, 16 + w.sw * 20, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();
  } else {
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(CW/2 - 14, MY);
    ctx.lineTo(CW/2 + 14, MY);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Glitch lines
  if (w.gi > 0.05) {
    ctx.shadowBlur = 0;
    for (let i = 0; i < Math.floor(w.gi * 6); i++) {
      ctx.globalAlpha = 0.3 + Math.random() * 0.4;
      ctx.fillStyle = c.primary;
      ctx.fillRect(0, Math.random() * CH, CW, 1 + Math.random() * 2);
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = c.primary;
    ctx.strokeStyle = c.primary;
  }

  // Scanlines
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#000';
  for (let y = 0; y < CH; y += 3) ctx.fillRect(0, y, CW, 1);
  ctx.globalAlpha = 1;

  // Vignette
  const vig = ctx.createRadialGradient(CW/2, CH/2, CH*0.2, CW/2, CH/2, CH*0.65);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, CW, CH);
}

// ── Sampling ──────────────────────────────────────────────────
function pickOptions(hintMood) {
  const byMood = {};
  EXPR_LIB.forEach(e => {
    if (!byMood[e.mood]) byMood[e.mood] = [];
    byMood[e.mood].push(e);
  });

  const picked = new Set();
  const result = [];

  // 1 from same mood
  const sameMoodPool = byMood[hintMood] ?? [];
  if (sameMoodPool.length) {
    const e = sameMoodPool[Math.floor(Math.random() * sameMoodPool.length)];
    picked.add(e.name); result.push(e);
  }

  // 1 from a different mood
  const otherMoods = Object.keys(byMood).filter(m => m !== hintMood);
  if (otherMoods.length) {
    const om = otherMoods[Math.floor(Math.random() * otherMoods.length)];
    const pool = byMood[om].filter(e => !picked.has(e.name));
    if (pool.length) {
      const e = pool[Math.floor(Math.random() * pool.length)];
      picked.add(e.name); result.push(e);
    }
  }

  // 2 fully random (deduplicated)
  const all = EXPR_LIB.filter(e => !picked.has(e.name));
  for (let i = 0; i < 2 && all.length; i++) {
    const idx = Math.floor(Math.random() * all.length);
    const e = all.splice(idx, 1)[0];
    picked.add(e.name); result.push(e);
  }

  // Shuffle result
  for (let i = result.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }

  return result;
}

// ── State ─────────────────────────────────────────────────────
let samples = [];
let idx = 0;
let labels = JSON.parse(localStorage.getItem('kvrc_labels') || '[]');
let options = [];
let animId = null;
let t = 0;

function saveLabels() {
  localStorage.setItem('kvrc_labels', JSON.stringify(labels));
}

function exportLabels() {
  const blob = new Blob([JSON.stringify(labels, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'labels.json'; a.click();
  URL.revokeObjectURL(url);
}

function stopAnimation() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
}

function renderOptions(canvases) {
  stopAnimation();
  const loop = (ts) => {
    t = ts / 1000;
    canvases.forEach((cv, i) => {
      if (options[i]) drawFace(cv, options[i], t);
    });
    animId = requestAnimationFrame(loop);
  };
  animId = requestAnimationFrame(loop);
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (idx >= samples.length) {
    app.innerHTML = '<div class="done-msg">All samples labeled. Export your labels below.</div>';
    const btn = document.createElement('button');
    btn.textContent = `Export labels.json (${labels.length} labels)`;
    btn.onclick = exportLabels;
    app.appendChild(btn);
    stopAnimation();
    return;
  }

  const sample = samples[idx];
  options = pickOptions(sample.hint_mood);

  // Reply box
  const box = document.createElement('div');
  box.className = 'reply-box';
  box.innerHTML = `"${sample.reply}"<div class="mood-hint">hint: ${sample.hint_mood}</div>`;
  app.appendChild(box);

  // Progress
  const prog = document.createElement('div');
  prog.className = 'progress';
  prog.textContent = `${idx + 1} / ${samples.length}  ·  labeled: ${labels.length}`;
  app.appendChild(prog);

  // Options
  const optDiv = document.createElement('div');
  optDiv.className = 'options';
  const canvases = [];

  options.forEach((entry, i) => {
    const card = document.createElement('div');
    card.className = 'option';

    const cv = document.createElement('canvas');
    cv.width = CW; cv.height = CH;
    canvases.push(cv);

    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = entry.name.replace(/_/g, ' ');

    card.appendChild(cv);
    card.appendChild(name);
    card.onclick = () => {
      labels.push({ reply: sample.reply, expression_name: entry.name });
      saveLabels();
      idx++;
      stopAnimation();
      render();
    };
    optDiv.appendChild(card);
  });

  app.appendChild(optDiv);

  // Controls
  const ctrl = document.createElement('div');
  ctrl.className = 'controls';

  const skip = document.createElement('button');
  skip.textContent = 'Skip';
  skip.onclick = () => { idx++; stopAnimation(); render(); };

  const exp = document.createElement('button');
  exp.textContent = `Export (${labels.length})`;
  exp.onclick = exportLabels;

  const status = document.createElement('span');
  status.id = 'status';
  status.textContent = 'Labels auto-saved to localStorage';

  ctrl.appendChild(skip);
  ctrl.appendChild(exp);
  ctrl.appendChild(status);
  app.appendChild(ctrl);

  renderOptions(canvases);
}

// ── Init ──────────────────────────────────────────────────────
fetch('./samples.json')
  .then(r => r.json())
  .then(data => {
    samples = data;
    // Shuffle samples for variety
    for (let i = samples.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [samples[i], samples[j]] = [samples[j], samples[i]];
    }
    render();
  })
  .catch(() => {
    document.getElementById('app').innerHTML =
      '<p style="color:#f44">Could not load samples.json. Serve this file from the tools/ directory.</p>';
  });
</script>
</body>
